name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting with semistandard
        run: npx semistandard

  test:
    name: Test on Node.js ${{ matrix.node-version }}
    needs: lint
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x, 24.x, 26.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Test coverage (optional)
        run: npm test -- --coverage
        continue-on-error: true

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-node-${{ matrix.node-version }}
          path: |
            coverage/
            test-results.xml
          retention-days: 7

  # Smoke-test global install like npm publish: pack from tree, then npm install -g.
  global-install:
    name: Global install (${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 22.x, 26.x]

    steps:
      # Shallow clones break some git commands npm may run during pack (exit 128).
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Allow git access to workspace (npm pack may invoke git)
        run: git config --global --add safe.directory "${GITHUB_WORKSPACE}"

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      # Pack with lifecycle scripts (like publish). prepare must not assume
      # devDependencies (e.g. husky) when packing without npm ci.
      - name: Create tarball (npm pack)
        id: pack
        run: |
          set -euo pipefail
          mkdir -p pack-out
          npm pack --pack-destination pack-out
          shopt -s nullglob
          tgz_files=(pack-out/*.tgz)
          if [ "${#tgz_files[@]}" -eq 0 ]; then
            echo "No .tgz produced in pack-out/"
            exit 1
          fi
          TGZ="$(realpath "${tgz_files[0]}")"
          echo "tgz=${TGZ}" >> "$GITHUB_OUTPUT"
          echo "Packed: ${TGZ}"

      - name: Global install from tarball
        run: npm install -g "${{ steps.pack.outputs.tgz }}"

      - name: Verify CLI is on PATH
        run: command -v hakk

      - name: Verify CLI runs
        run: hakk --version
