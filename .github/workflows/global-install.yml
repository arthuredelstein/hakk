# Smoke-test global install the same way users get the package from npm:
# pack from the checked-out tree (matches `files` + publish layout), then
# `npm install -g` the tarball on a clean Linux runner.

name: Global install (from pack)

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  global-install:
    name: npm install -g from git (pack)
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 22.x, 26.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      # Pack with lifecycle scripts (like publish). prepare must not assume
      # devDependencies (e.g. husky) when packing without npm ci.
      # Use --pack-destination so we do not parse stdout (npm prints notices
      # and script lines like "> pkg@version prepare", which breaks GITHUB_OUTPUT).
      - name: Create tarball (npm pack)
        id: pack
        run: |
          set -euo pipefail
          mkdir -p pack-out
          npm pack --pack-destination pack-out
          TGZ="$(ls -1 pack-out/*.tgz | head -n 1)"
          echo "tgz=${TGZ}" >> "$GITHUB_OUTPUT"
          echo "Packed: ${TGZ}"

      - name: Global install from tarball
        run: npm install -g "${{ steps.pack.outputs.tgz }}"

      - name: Verify CLI is on PATH
        run: command -v hakk

      - name: Verify CLI runs
        run: hakk --version
